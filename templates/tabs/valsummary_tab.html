<script>
{%- raw %}
// ── VALIDATION SUMMARY TAB — current version at a glance + version compare ──
let valSummaryLoaded = false;

async function loadValSummary(force) {
  if (valSummaryLoaded && !force) return;
  valSummaryLoaded = true;
  const el = document.getElementById('valSummaryContent');
  el.innerHTML = '<div class="loading">Loading version summary...</div>';
  try {
    const d = await fetch('/tradeai/stats').then(r => r.json());
    el.innerHTML = buildValSummaryHTML(d);
  } catch(e) {
    el.innerHTML = `<div style="color:var(--down);padding:20px">Failed to load stats: ${e.message}</div>`;
  }
}

function _vsTile(label, val, color) {
  return `<div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;text-align:center">
    <div style="font-size:10px;color:var(--muted);letter-spacing:0.6px;margin-bottom:5px">${label}</div>
    <div style="font-family:'Syne',sans-serif;font-size:22px;font-weight:800;${color ? 'color:'+color : ''}">${val != null ? val : '—'}</div>
  </div>`;
}

function buildValSummaryHTML(d) {
  const versions = d.versions || [];
  const cur = versions.find(v => v.current) || versions[versions.length - 1];
  const sl = d.selfLearning || {};
  const minN = sl.minTrades || 10;
  const fmtPct = v => v != null ? (v > 0 ? '+' : '') + Number(v).toFixed(2) + '%' : '—';
  const pctColor = v => v > 0 ? 'var(--up)' : (v < 0 ? 'var(--down)' : 'var(--muted)');
  const statusChips = {
    'champion': '<span style="font-size:10px;padding:3px 10px;border-radius:5px;background:rgba(251,191,36,0.15);color:#fbbf24;font-weight:700">🏆 CHAMPION</span>',
    'testing':  '<span style="font-size:10px;padding:3px 10px;border-radius:5px;background:rgba(96,165,250,0.15);color:#60a5fa;font-weight:700">🧪 TESTING</span>',
    'retired':  '<span style="font-size:10px;padding:3px 10px;border-radius:5px;background:rgba(107,114,128,0.15);color:#9ca3af;font-weight:700">RETIRED</span>',
    'insufficient-data': '<span style="font-size:10px;padding:3px 10px;border-radius:5px;background:rgba(107,114,128,0.15);color:#6b7280;font-weight:700">NO DATA</span>',
  };

  let html = `<div style="margin-bottom:20px">
    <div style="font-family:'Syne',sans-serif;font-weight:800;font-size:18px">📈 VALIDATION SUMMARY</div>
    <div style="font-size:11px;color:var(--muted);margin-top:2px">Where the engine stands right now — full breakdowns live in the ✅ VALIDATION tab.</div>
  </div>`;

  // ── CURRENT VERSION HERO ───────────────────────────────────────────────────
  if (cur) {
    const s = cur.stats;
    const a = cur.assetStats;
    const n = a ? a.totalN : 0;
    const progress = Math.min(100, Math.round(n / minN * 100));
    const changes = (cur.changes || []);
    html += `<div style="border:1px solid var(--accent);border-radius:12px;padding:18px 20px;margin-bottom:16px;background:var(--surface)">
      <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:10px">
        <span style="font-family:'Syne',sans-serif;font-size:30px;font-weight:800;color:var(--accent)">v${cur.version}</span>
        <div>
          <div style="font-weight:700;font-size:14px">${cur.label || ''}</div>
          <div style="font-size:10px;color:var(--muted)">active since ${cur.date || '—'}</div>
        </div>
        <span style="margin-left:auto">${statusChips[cur.status] || ''}</span>
      </div>
      <ul style="margin:0 0 12px 16px;padding:0;font-size:11px;color:var(--muted);line-height:1.7">
        ${changes.slice(0,4).map(c => '<li>' + c + '</li>').join('')}
        ${changes.length > 4 ? `<li style="list-style:none;color:var(--muted)">… +${changes.length-4} more (see Validation tab)</li>` : ''}
      </ul>
      <div style="display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:12px">
        ${_vsTile('ACCOUNT RETURN', cur.accountReturnPct != null ? fmtPct(cur.accountReturnPct) : null, cur.accountReturnPct != null ? pctColor(cur.accountReturnPct) : null)}
        ${_vsTile('BUYS (CLOSED+OPEN)', a ? `${a.totalN} (${a.closedN}+${a.openN})` : null)}
        ${_vsTile('ASSET RETURN', a ? fmtPct(a.totalReturnPct) : null, a ? pctColor(a.totalReturnPct) : null)}
        ${_vsTile('TOTAL P&L', a ? (a.totalPnl >= 0 ? '+' : '') + '$' + a.totalPnl.toFixed(2) : null, a ? pctColor(a.totalPnl) : null)}
        ${_vsTile('CLOSED-TRADE AVG', s ? fmtPct(s.expectancyPct) : null, s ? pctColor(s.expectancyPct) : null)}
        ${_vsTile('WIN RATE', s && s.winRate != null ? s.winRate + '%' : null)}
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <div style="flex:1;height:8px;background:var(--surface2);border-radius:4px;overflow:hidden">
          <div style="width:${progress}%;height:100%;background:${progress >= 100 ? 'var(--accent)' : '#60a5fa'};border-radius:4px"></div>
        </div>
        <div style="font-size:10px;color:var(--muted);white-space:nowrap">
          ${n}/${minN} buys to judgment ${progress >= 100 ? '— comparable to champion now' : ''}
        </div>
      </div>
      <div style="font-size:10px;color:var(--muted);margin-top:8px">ACCOUNT RETURN = whole-portfolio equity change since this version started (${cur.assetAtStart != null ? '$'+cur.assetAtStart.toLocaleString() : '—'} → now) — always available, even with zero trades under this version. ASSET RETURN = realized P&amp;L (closed trades) + unrealized P&amp;L (still-open positions bought under this version), against capital deployed — the champion/rollback decision uses this one when enough buys exist.</div>
    </div>`;
  }

  // ── VERSION COMPARISON CHART — dollar-weighted asset return, zero baseline ─
  const withStats = versions.filter(v => v.assetStats && v.assetStats.totalReturnPct != null);
  html += `<div style="border:1px solid var(--border);border-radius:12px;padding:16px 20px;margin-bottom:16px;background:var(--surface)">
    <div style="font-size:10px;letter-spacing:1px;color:var(--accent);margin-bottom:2px">ASSET RETURN BY VERSION</div>
    <div style="font-size:10px;color:var(--muted);margin-bottom:12px">Realized + unrealized P&amp;L against capital deployed, credited to each engine version (includes still-open positions). Bars above the line make money; below lose it.</div>`;

  if (!withStats.length) {
    html += `<div style="color:var(--muted);font-size:12px;padding:16px 0">No buys logged yet — the chart appears after the first purchase.</div>`;
  } else {
    const W = 640, H = 230, padT = 26, padB = 44, padL = 8, padR = 8;
    const zeroableMax = Math.max(1, ...withStats.map(v => Math.abs(v.assetStats.totalReturnPct)));
    const plotH = H - padT - padB;
    const zeroY = padT + plotH / 2;
    const scale = (plotH / 2 - 6) / zeroableMax;
    const slotW = Math.min(110, (W - padL - padR) / versions.length);
    const barW = 40;
    const originX = (W - slotW * versions.length) / 2;

    let bars = '', labels = '', hits = '';
    versions.forEach((v, i) => {
      const cx = originX + i * slotW + slotW / 2;
      const a = v.assetStats;
      const isCur = v.current;
      const crown = d.championVersion === v.version ? ' 🏆' : '';
      if (a && a.totalReturnPct != null) {
        const val = a.totalReturnPct;
        const h = Math.max(3, Math.abs(val) * scale);
        const up = val >= 0;
        const y = up ? zeroY - h : zeroY;
        const color = up ? 'var(--up)' : 'var(--down)';
        const r = Math.min(4, h);
        // bar with 4px rounded corners at the DATA end only, flat at baseline
        const x = cx - barW / 2;
        const path = up
          ? `M ${x} ${zeroY} L ${x} ${y + r} Q ${x} ${y} ${x + r} ${y} L ${x + barW - r} ${y} Q ${x + barW} ${y} ${x + barW} ${y + r} L ${x + barW} ${zeroY} Z`
          : `M ${x} ${zeroY} L ${x} ${zeroY + h - r} Q ${x} ${zeroY + h} ${x + r} ${zeroY + h} L ${x + barW - r} ${zeroY + h} Q ${x + barW} ${zeroY + h} ${x + barW} ${zeroY + h - r} L ${x + barW} ${zeroY} Z`;
        bars += `<path d="${path}" fill="${color}"></path>`;
        // signed value label at the data end — text token color, not series color
        const ly = up ? y - 7 : zeroY + h + 14;
        labels += `<text x="${cx}" y="${ly}" text-anchor="middle" font-size="11" fill="var(--text)" font-family="DM Mono,monospace">${(val>0?'+':'')}${val.toFixed(2)}%</text>`;
        hits += `<rect x="${cx - slotW/2}" y="${padT}" width="${slotW}" height="${plotH}" fill="transparent"
          onmousemove="_vsTip(event, '<b>v${v.version}</b> ${v.label || ''}<br>buys: ${a.totalN} (${a.closedN} closed, ${a.openN} open)<br>asset return ${(val>0?'+':'')}${val.toFixed(2)}%<br>total P&amp;L ${a.totalPnl>=0?'+':''}$${a.totalPnl.toFixed(2)} ($${a.closedPnl.toFixed(2)} realized + $${a.openPnl.toFixed(2)} unrealized)')"
          onmouseleave="_vsTipHide()"></rect>`;
      } else {
        labels += `<text x="${cx}" y="${zeroY - 7}" text-anchor="middle" font-size="10" fill="var(--muted)" font-family="DM Mono,monospace">no buys</text>`;
      }
      // version label under the axis
      labels += `<text x="${cx}" y="${H - 26}" text-anchor="middle" font-size="11" font-weight="700" fill="${isCur ? 'var(--accent)' : 'var(--muted)'}" font-family="DM Mono,monospace">v${v.version}${crown}</text>`;
      labels += `<text x="${cx}" y="${H - 12}" text-anchor="middle" font-size="9" fill="var(--muted)" font-family="DM Mono,monospace">${a ? 'n=' + a.totalN : ''}${isCur ? (a ? ' · ' : '') + 'CURRENT' : ''}</text>`;
    });

    html += `<div style="position:relative;overflow-x:auto">
      <svg viewBox="0 0 ${W} ${H}" style="width:100%;max-width:${W}px;display:block;margin:0 auto">
        <line x1="${padL}" y1="${zeroY}" x2="${W - padR}" y2="${zeroY}" stroke="#3a3a4e" stroke-width="1"></line>
        <text x="${padL + 2}" y="${zeroY - 5}" font-size="9" fill="var(--muted)" font-family="DM Mono,monospace">0%</text>
        ${bars}${labels}${hits}
      </svg>
      <div id="vsTooltip" style="display:none;position:absolute;pointer-events:none;background:#1f1f2e;border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:11px;line-height:1.6;z-index:50;max-width:260px"></div>
    </div>`;
  }
  html += `</div>`;

  // ── TABLE VIEW (same data, readable without color) — latest version first ──
  // Gated on ACCOUNT RETURN or ASSET RETURN — a version with zero trades of
  // its own still has an account-level snapshot, so it still shows up.
  const anyVersionData = versions.some(v => (v.assetStats && v.assetStats.totalReturnPct != null) || v.accountReturnPct != null);
  if (anyVersionData) {
    const tableVersions = versions.slice().reverse(); // newest first
    html += `<div style="border:1px solid var(--border);border-radius:12px;padding:14px 18px;background:var(--surface)">
      <div style="font-size:10px;letter-spacing:1px;color:var(--accent);margin-bottom:8px">ALL VERSIONS — TABLE (LATEST FIRST)</div>
      <div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:11px;font-family:'DM Mono',monospace">
        <thead><tr style="color:var(--muted);border-bottom:1px solid var(--border)">
          <th style="padding:6px 10px;text-align:left">VERSION</th><th style="padding:6px 10px;text-align:left">STATUS</th>
          <th style="padding:6px 10px;text-align:right">ACCOUNT RETURN</th>
          <th style="padding:6px 10px;text-align:right">BUYS (CLOSED+OPEN)</th>
          <th style="padding:6px 10px;text-align:right">ASSET RETURN</th><th style="padding:6px 10px;text-align:right">TOTAL P&L</th>
          <th style="padding:6px 10px;text-align:right">CLOSED AVG</th><th style="padding:6px 10px;text-align:right">WIN%</th>
        </tr></thead><tbody>
        ${tableVersions.map(v => {
          const s = v.stats;
          const a = v.assetStats;
          return `<tr style="border-bottom:1px solid var(--border)">
            <td style="padding:6px 10px;font-weight:700;${v.current ? 'color:var(--accent)' : ''}">v${v.version}${d.championVersion === v.version ? ' 🏆' : ''}${v.current ? ' (current)' : ''} <span style="color:var(--muted);font-weight:400">${v.label || ''}</span></td>
            <td style="padding:6px 10px">${v.status || '—'}</td>
            <td style="padding:6px 10px;text-align:right;font-weight:700;color:${v.accountReturnPct != null ? pctColor(v.accountReturnPct) : 'var(--muted)'}">${v.accountReturnPct != null ? fmtPct(v.accountReturnPct) : '—'}</td>
            <td style="padding:6px 10px;text-align:right">${a ? `${a.totalN} (${a.closedN}+${a.openN})` : '0'}</td>
            <td style="padding:6px 10px;text-align:right;color:${a ? pctColor(a.totalReturnPct) : 'var(--muted)'}">${a ? fmtPct(a.totalReturnPct) : '—'}</td>
            <td style="padding:6px 10px;text-align:right;color:${a ? pctColor(a.totalPnl) : 'var(--muted)'}">${a ? (a.totalPnl>=0?'+':'')+'$'+a.totalPnl.toFixed(2) : '—'}</td>
            <td style="padding:6px 10px;text-align:right;color:${s ? pctColor(s.expectancyPct) : 'var(--muted)'}">${s ? fmtPct(s.expectancyPct) : '—'}</td>
            <td style="padding:6px 10px;text-align:right">${s && s.winRate != null ? s.winRate + '%' : '—'}</td>
          </tr>`;
        }).join('')}
        </tbody></table></div>
      <div style="font-size:10px;color:var(--muted);margin-top:6px">ACCOUNT RETURN = whole-portfolio equity change since the version started — always available, even with zero trades under that version. ASSET RETURN needs ${minN}+ buys (closed+open) of its own before it's reliable and is what the champion/rollback decision uses. CLOSED AVG is the average %/trade across closed sells only — shown for context.</div>
    </div>`;
  }

  return html;
}

function _vsTip(ev, htmlContent) {
  const tip = document.getElementById('vsTooltip');
  if (!tip) return;
  tip.innerHTML = htmlContent;
  tip.style.display = 'block';
  const wrap = tip.parentElement.getBoundingClientRect();
  let x = ev.clientX - wrap.left + 14, y = ev.clientY - wrap.top - 10;
  if (x + 270 > wrap.width) x = ev.clientX - wrap.left - 280;
  tip.style.left = x + 'px';
  tip.style.top = y + 'px';
}
function _vsTipHide() {
  const tip = document.getElementById('vsTooltip');
  if (tip) tip.style.display = 'none';
}
{%- endraw %}
</script>

<script>
  {%- raw %}
// ── BACKTEST TAB ──────────────────────────────────────────────────────────────
let backtestLoaded = false;

async function loadBacktest(force) {
  if (backtestLoaded && !force) return;
  backtestLoaded = true;
  const el = document.getElementById('backtestContent');
  el.innerHTML = '<div class="loading">Loading backtest analysis...</div>';
  try {
    const [sigData, tradeData] = await Promise.all([
      fetch('/signal/history').then(r => r.json()),
      fetch('/tradeai').then(r => r.json())
    ]);
    el.innerHTML = buildBacktestHTML(sigData, tradeData);
  } catch(e) {
    el.innerHTML = '<span style="color:var(--down)">Failed to load backtest data: ' + e.message + '</span>';
    backtestLoaded = false;
  }
}

function buildBacktestHTML(sigData, tradeData) {
  const snapshots  = (sigData.snapshots || []).filter(s => s.rows && s.rows.some(r => r.actualPrice != null));
  const holdings   = (tradeData.holdings || []).map(h => h.ticker);
  const lastRec    = tradeData.lastRecommend || {};
  const recBuys    = (lastRec.buys  || []).map(b => b.ticker || b);
  const recSells   = (lastRec.sells || []).map(s => s.ticker || s);
  const recommended = [...new Set([...recBuys, ...recSells])];

  if (snapshots.length === 0) return '<div style="padding:24px;color:var(--muted)">No snapshots with actuals yet. Run Update Actuals in the Signal tab first.</div>';

  // ── Build per-ticker stats ─────────────────────────────────────────────────
  const tickerStats = {};
  for (const snap of snapshots) {
    for (const row of snap.rows) {
      if (!row.actualPrice || row.forecastLow == null || row.forecastHigh == null) continue;
      const t = row.ticker;
      if (!tickerStats[t]) tickerStats[t] = { ticker: t, total: 0, hit: 0, missLow: 0, missHigh: 0, bucket: row.bucket || '—', dates: [] };
      const s = tickerStats[t];
      s.total++;
      s.dates.push(snap.date);
      if (row.accuracy === 'hit')       s.hit++;
      else if (row.accuracy === 'miss-low')  s.missLow++;
      else if (row.accuracy === 'miss-high') s.missHigh++;
      s.bucket = row.bucket || s.bucket;
    }
  }

  const tickers = Object.values(tickerStats).sort((a, b) => (b.hit/b.total) - (a.hit/a.total));

  // ── Group summaries ────────────────────────────────────────────────────────
  function groupSummary(label, color, list) {
    const group = tickers.filter(t => list.includes(t.ticker));
    if (!group.length) return '';
    const total = group.reduce((s, t) => s + t.total, 0);
    const hits  = group.reduce((s, t) => s + t.hit,   0);
    const pct   = total > 0 ? (hits/total*100).toFixed(1) : '—';
    const cls   = parseFloat(pct) >= 50 ? 'var(--up)' : 'var(--down)';
    return '<div style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:14px 18px;display:flex;align-items:center;gap:16px">'
      + '<div style="font-size:11px;font-weight:700;color:' + color + ';min-width:120px">' + label + '</div>'
      + '<div style="font-size:22px;font-weight:800;color:' + cls + ';font-family:\'DM Mono\',monospace">' + pct + '%</div>'
      + '<div style="font-size:11px;color:var(--muted)">' + hits + ' hits / ' + total + ' forecasts across ' + group.length + ' tickers</div>'
      + '</div>';
  }

  const allTickers   = tickers.map(t => t.ticker);
  const identified   = allTickers.filter(t => !holdings.includes(t));

  // ── Ticker table ──────────────────────────────────────────────────────────
  function hitBar(hit, total) {
    const pct = total > 0 ? hit/total : 0;
    const color = pct >= 0.6 ? 'var(--up)' : pct >= 0.4 ? 'var(--warn)' : 'var(--down)';
    return '<div style="display:flex;align-items:center;gap:6px">'
      + '<div style="width:60px;height:6px;background:var(--surface2);border-radius:3px;overflow:hidden">'
      + '<div style="width:' + (pct*100).toFixed(0) + '%;height:100%;background:' + color + ';border-radius:3px"></div></div>'
      + '<span style="font-size:11px;color:' + color + ';font-family:\'DM Mono\',monospace;font-weight:700">' + (pct*100).toFixed(0) + '%</span>'
      + '</div>';
  }

  function groupTag(ticker) {
    if (holdings.includes(ticker))    return '<span style="font-size:9px;padding:2px 6px;background:rgba(74,222,128,0.15);color:var(--up);border-radius:3px;font-weight:700">HELD</span>';
    if (recommended.includes(ticker)) return '<span style="font-size:9px;padding:2px 6px;background:rgba(251,191,36,0.15);color:var(--warn);border-radius:3px;font-weight:700">REC</span>';
    return '<span style="font-size:9px;padding:2px 6px;background:var(--surface2);color:var(--muted);border-radius:3px">IDENTIFIED</span>';
  }

  const tickerRows = tickers.map(t => {
    const hitPct = t.total > 0 ? (t.hit/t.total*100).toFixed(0) : '—';
    return '<tr>'
      + '<td style="font-family:\'Syne\',sans-serif;font-weight:700">' + t.ticker + '</td>'
      + '<td>' + groupTag(t.ticker) + '</td>'
      + '<td style="color:var(--muted);font-size:11px">' + t.bucket + '</td>'
      + '<td style="text-align:center">' + t.total + '</td>'
      + '<td>' + hitBar(t.hit, t.total) + '</td>'
      + '<td style="text-align:center;font-size:11px;color:var(--up)">' + t.hit + '</td>'
      + '<td style="text-align:center;font-size:11px;color:var(--down)">' + (t.missLow + t.missHigh) + '</td>'
      + '<td style="text-align:center;font-size:11px;color:var(--muted)">' + t.missLow + ' low / ' + t.missHigh + ' high</td>'
      + '</tr>';
  }).join('');

  // ── Daily summary ─────────────────────────────────────────────────────────
  const dailyRows = snapshots.slice().reverse().map(snap => {
    const rows = snap.rows.filter(r => r.actualPrice != null);
    const hits = rows.filter(r => r.accuracy === 'hit').length;
    const total = rows.length;
    const pct = total > 0 ? (hits/total*100).toFixed(0) : '—';
    const cls = parseInt(pct) >= 50 ? 'var(--up)' : 'var(--down)';
    return '<tr>'
      + '<td style="font-family:\'DM Mono\',monospace;font-size:11px">' + snap.date + '</td>'
      + '<td style="text-align:center">' + total + '</td>'
      + '<td>' + hitBar(hits, total) + '</td>'
      + '<td style="text-align:center;font-size:12px;font-weight:700;color:' + cls + '">' + pct + '%</td>'
      + '<td style="text-align:center;font-size:11px;color:var(--up)">' + hits + '</td>'
      + '<td style="text-align:center;font-size:11px;color:var(--down)">' + (total - hits) + '</td>'
      + '</tr>';
  }).join('');

  // ── Weekly summary ────────────────────────────────────────────────────────
  const weekMap = {};
  for (const snap of snapshots) {
    const d = new Date(snap.date);
    const week = snap.date.slice(0,7) + ' W' + Math.ceil(d.getDate()/7);
    if (!weekMap[week]) weekMap[week] = { hit: 0, total: 0 };
    for (const r of snap.rows) {
      if (!r.actualPrice) continue;
      weekMap[week].total++;
      if (r.accuracy === 'hit') weekMap[week].hit++;
    }
  }
  const weeklyRows = Object.entries(weekMap).reverse().map(([week, w]) => {
    const pct = w.total > 0 ? (w.hit/w.total*100).toFixed(0) : '—';
    const cls = parseInt(pct) >= 50 ? 'var(--up)' : 'var(--down)';
    return '<tr>'
      + '<td style="font-family:\'DM Mono\',monospace;font-size:11px">' + week + '</td>'
      + '<td style="text-align:center">' + w.total + '</td>'
      + '<td>' + hitBar(w.hit, w.total) + '</td>'
      + '<td style="text-align:center;font-size:12px;font-weight:700;color:' + cls + '">' + pct + '%</td>'
      + '<td style="text-align:center;font-size:11px;color:var(--up)">' + w.hit + '</td>'
      + '<td style="text-align:center;font-size:11px;color:var(--down)">' + (w.total - w.hit) + '</td>'
      + '</tr>';
  }).join('');

  // ── Monthly summary ───────────────────────────────────────────────────────
  const monthMap = {};
  for (const snap of snapshots) {
    const mo = snap.date.slice(0,7);
    if (!monthMap[mo]) monthMap[mo] = { hit: 0, total: 0 };
    for (const r of snap.rows) {
      if (!r.actualPrice) continue;
      monthMap[mo].total++;
      if (r.accuracy === 'hit') monthMap[mo].hit++;
    }
  }
  const monthlyRows = Object.entries(monthMap).reverse().map(([mo, m]) => {
    const pct = m.total > 0 ? (m.hit/m.total*100).toFixed(0) : '—';
    const cls = parseInt(pct) >= 50 ? 'var(--up)' : 'var(--down)';
    return '<tr>'
      + '<td style="font-family:\'DM Mono\',monospace;font-size:11px">' + mo + '</td>'
      + '<td style="text-align:center">' + m.total + '</td>'
      + '<td>' + hitBar(m.hit, m.total) + '</td>'
      + '<td style="text-align:center;font-size:12px;font-weight:700;color:' + cls + '">' + pct + '%</td>'
      + '<td style="text-align:center;font-size:11px;color:var(--up)">' + m.hit + '</td>'
      + '<td style="text-align:center;font-size:11px;color:var(--down)">' + (m.total - m.hit) + '</td>'
      + '</tr>';
  }).join('');

  function sectionTitle(t) {
    return '<div style="font-family:\'Syne\',sans-serif;font-size:13px;font-weight:700;letter-spacing:1px;color:var(--muted);margin:24px 0 10px">' + t + '</div>';
  }

  function table(headers, rows) {
    return '<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:12px">'
      + '<thead><tr>' + headers.map(h => '<th style="text-align:left;padding:6px 10px;border-bottom:1px solid var(--border);color:var(--muted);font-size:10px;letter-spacing:0.5px">' + h + '</th>').join('') + '</tr></thead>'
      + '<tbody>' + rows + '</tbody></table></div>';
  }

  const totalHits  = tickers.reduce((s,t) => s+t.hit, 0);
  const totalForec = tickers.reduce((s,t) => s+t.total, 0);
  const overallPct = totalForec > 0 ? (totalHits/totalForec*100).toFixed(1) : '—';
  const overallCls = parseFloat(overallPct) >= 50 ? 'var(--up)' : 'var(--down)';

  return '<div style="padding:20px;max-width:1100px">'
    + '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">'
    + '<div style="font-family:\'Syne\',sans-serif;font-size:20px;font-weight:800">SIGNAL FORECAST BACKTEST</div>'
    + '<button onclick="backtestLoaded=false;loadBacktest(true)" style="font-size:11px;padding:6px 14px;background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--muted);cursor:pointer">↺ REFRESH</button>'
    + '</div>'

    + '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:8px">'
    + '<div style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:14px 18px">'
    + '<div style="font-size:10px;color:var(--muted);margin-bottom:4px">OVERALL HIT RATE</div>'
    + '<div style="font-size:32px;font-weight:800;color:' + overallCls + ';font-family:\'DM Mono\',monospace">' + overallPct + '%</div>'
    + '<div style="font-size:11px;color:var(--muted)">' + totalHits + ' hits / ' + totalForec + ' forecasts · ' + snapshots.length + ' snapshots · ' + tickers.length + ' tickers</div>'
    + '</div>'
    + '<div style="display:flex;flex-direction:column;gap:8px">'
    + groupSummary('★ HELD', 'var(--up)', holdings)
    + groupSummary('🎯 RECOMMENDED', 'var(--warn)', recommended)
    + groupSummary('📋 IDENTIFIED', 'var(--muted)', identified)
    + '</div></div>'

    + sectionTitle('TICKER BREAKDOWN')
    + table(['TICKER','GROUP','BUCKET','FORECASTS','HIT RATE','HITS','MISSES','MISS DETAIL'], tickerRows)

    + sectionTitle('DAILY ACCURACY')
    + table(['DATE','FORECASTS','HIT RATE','%','HITS','MISSES'], dailyRows)

    + sectionTitle('WEEKLY ACCURACY')
    + table(['WEEK','FORECASTS','HIT RATE','%','HITS','MISSES'], weeklyRows)

    + sectionTitle('MONTHLY ACCURACY')
    + table(['MONTH','FORECASTS','HIT RATE','%','HITS','MISSES'], monthlyRows)

    + '</div>';
}
// ── END BACKTEST TAB ──────────────────────────────────────────────────────────
  {%- endraw %}
</script>

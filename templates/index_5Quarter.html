<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Stock Analysis Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --surface2: #1a1a24;
      --border: #2a2a3a;
      --accent: #c8f135;
      --accent2: #7c6af7;
      --text: #e8e8f0;
      --muted: #6b6b80;
      --up: #4ade80;
      --down: #f87171;
      --warn: #fbbf24;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* HEADER */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 32px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: rgba(10,10,15,0.95);
      backdrop-filter: blur(12px);
      z-index: 100;
    }
    .header-left { display: flex; align-items: center; gap: 16px; }
    .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 20px; letter-spacing: -0.5px; }
    .logo span { color: var(--accent); }
    .status-pill {
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 20px;
      border: 1px solid var(--border);
      color: var(--muted);
    }
    .status-pill.running { border-color: var(--accent); color: var(--accent); animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
    .header-actions { display: flex; gap: 10px; align-items: center; }
    .btn {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      padding: 7px 16px;
      border-radius: 6px;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      text-decoration: none;
      transition: all 0.2s;
    }
    .btn:hover { border-color: var(--accent); color: var(--accent); }
    .btn-primary { background: var(--accent); color: #0a0a0f; border-color: var(--accent); font-weight: 500; }
    .btn-primary:hover { background: #d4f54d; color: #0a0a0f; }

    /* WATCHLIST FORM */
    .watchlist-bar {
      padding: 16px 32px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .ticker-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 4px 10px;
      font-size: 12px;
      font-weight: 500;
    }
    .ticker-tag a { color: var(--down); text-decoration: none; font-size: 11px; }
    .ticker-tag a:hover { color: #ff5555; }
    .add-form { display: flex; gap: 8px; }
    .add-form input {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 12px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      width: 120px;
      outline: none;
      transition: border-color 0.2s;
    }
    .add-form input:focus { border-color: var(--accent); }
    .add-form input::placeholder { color: var(--muted); }

    /* TABS */
    .tabs {
      display: flex;
      gap: 0;
      padding: 0 32px;
      border-bottom: 1px solid var(--border);
    }
    .tab {
      padding: 14px 20px;
      font-size: 12px;
      cursor: pointer;
      color: var(--muted);
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
      letter-spacing: 0.5px;
    }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab:hover { color: var(--text); }

    /* MAIN CONTENT */
    .content { padding: 28px 32px; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* SUMMARY ROW */
    .summary-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 28px;
    }
    .summary-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 18px 20px;
    }
    .summary-card .label { font-size: 11px; color: var(--muted); letter-spacing: 0.5px; margin-bottom: 6px; }
    .summary-card .value { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 700; }
    .summary-card .sub { font-size: 11px; color: var(--muted); margin-top: 4px; }

    /* STOCK CARDS GRID */
    .stocks-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }
    .stock-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      transition: border-color 0.2s;
    }
    .stock-card:hover { border-color: var(--accent2); }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 20px 14px;
      border-bottom: 1px solid var(--border);
    }
    .ticker-name { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
    .ticker-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .price-block { text-align: right; }
    .price { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 700; }
    .mktcap { font-size: 11px; color: var(--muted); margin-top: 2px; }

    /* RANKS ROW */
    .ranks-row {
      display: flex;
      gap: 8px;
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }
    .rank-badge {
      font-size: 10px;
      padding: 3px 8px;
      border-radius: 4px;
      border: 1px solid var(--border);
      color: var(--muted);
    }
    .rank-badge.rank-1 { border-color: var(--accent); color: var(--accent); }
    .rank-badge.rank-2 { border-color: var(--accent2); color: var(--accent2); }

    /* COLLAPSIBLE CARD SECTIONS */
    .card-section { 
      padding: 16px 20px; 
      border-bottom: 1px solid var(--border); 
      position: relative;
    }
    .card-section:last-child { border-bottom: none; }
    .section-title {
      font-size: 10px;
      letter-spacing: 1px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 0;
      cursor: pointer;
    }
    .section-toggle {
      position: absolute;
      right: 20px;
      top: 14px;
      font-size: 18px;
      color: var(--accent);
      cursor: pointer;
      line-height: 1;
      user-select: none;
      transition: transform 0.2s ease;
    }
    .section-content {
      max-height: 0;
      overflow: hidden;
      opacity: 0;
      transition: max-height 0.3s ease-out, opacity 0.2s ease, margin-top 0.2s;
    }
    .card-section.expanded .section-content {
      max-height: 2000px;
      opacity: 1;
      margin-top: 12px;
    }
    .card-section.expanded .section-toggle {
      transform: rotate(45deg);
      color: var(--down);
    }

    /* METRICS GRID */
    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }
    .metric { }
    .metric .m-label { font-size: 10px; color: var(--muted); margin-bottom: 3px; }
    .metric .m-value { font-size: 13px; font-weight: 500; }
    .metric .m-change { font-size: 10px; margin-top: 2px; }
    .up { color: var(--up); }
    .down { color: var(--down); }
    .neutral { color: var(--muted); }

    /* FINANCIALS TABLE */
    .fin-table { width: 100%; border-collapse: collapse; }
    .fin-table th {
      font-size: 10px;
      color: var(--muted);
      text-align: right;
      padding: 4px 8px;
      border-bottom: 1px solid var(--border);
      letter-spacing: 0.5px;
    }
    .fin-table th:first-child { text-align: left; }
    .fin-table td {
      font-size: 11px;
      padding: 5px 8px;
      text-align: right;
      border-bottom: 1px solid rgba(42,42,58,0.5);
    }
    .fin-table td:first-child { text-align: left; color: var(--muted); }
    .fin-table tr:last-child td { border-bottom: none; }

    /* AI SUMMARY */
    .ai-highlight {
      background: rgba(124,106,247,0.08);
      border: 1px solid rgba(124,106,247,0.2);
      border-radius: 8px;
      padding: 14px 16px;
      margin-bottom: 12px;
      font-size: 12px;
      line-height: 1.7;
      color: var(--text);
    }
    .ai-tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 4px;
      margin-bottom: 8px;
    }
    .sentiment-bullish { background: rgba(74,222,128,0.1); color: var(--up); border: 1px solid rgba(74,222,128,0.2); }
    .sentiment-bearish { background: rgba(248,113,113,0.1); color: var(--down); border: 1px solid rgba(248,113,113,0.2); }
    .sentiment-neutral { background: rgba(107,107,128,0.1); color: var(--muted); border: 1px solid var(--border); }

    .ai-list { list-style: none; }
    .ai-list li {
      font-size: 11px;
      padding: 4px 0;
      color: var(--muted);
      display: flex;
      gap: 8px;
    }
    .ai-list li::before { content: "→"; color: var(--accent2); flex-shrink: 0; }

    /* EVENTS */
    .events-list { display: flex; flex-direction: column; gap: 8px; }
    .event-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 12px;
      background: var(--surface2);
      border-radius: 6px;
      border: 1px solid var(--border);
    }
    .event-label { font-size: 11px; color: var(--muted); }
    .event-value { font-size: 12px; font-weight: 500; }
    .event-estimate { font-size: 10px; color: var(--muted); margin-top: 2px; text-align: right; }

    /* GAINERS TABLE */
    .gainers-table { width: 100%; border-collapse: collapse; }
    .gainers-table th {
      font-size: 10px;
      color: var(--muted);
      text-align: left;
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
    .gainers-table td {
      padding: 10px 12px;
      border-bottom: 1px solid rgba(42,42,58,0.5);
      font-size: 12px;
    }
    .gainers-table tr:last-child td { border-bottom: none; }
    .gainers-table tr:hover td { background: var(--surface2); }
    .gain-pct {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 14px;
      color: var(--up);
    }
    .rank-num {
      font-size: 11px;
      color: var(--muted);
      width: 24px;
    }

    /* PEER RANKINGS */
    .peer-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }
    .peer-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 18px;
    }
    .peer-card .peer-title {
      font-size: 10px;
      letter-spacing: 1px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 14px;
    }
    .peer-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 7px 0;
      border-bottom: 1px solid rgba(42,42,58,0.5);
    }
    .peer-row:last-child { border-bottom: none; }
    .peer-ticker { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 14px; }
    .peer-val { font-size: 12px; }
    .peer-rank {
      font-size: 10px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--surface2);
      color: var(--muted);
      flex-shrink: 0;
    }
    .peer-rank.r1 { background: rgba(200,241,53,0.15); color: var(--accent); }
    .peer-rank.r2 { background: rgba(124,106,247,0.15); color: var(--accent2); }

    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--muted);
      display: inline-block;
      margin-right: 4px;
      vertical-align: middle;
    }
    .status-dot.running { background: var(--accent); animation: pulse 1s infinite; }

    /* LOADING */
    .loading { text-align: center; padding: 60px; color: var(--muted); }

    /* TOOLTIP */
    .info-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 1px solid var(--muted);
      color: var(--muted);
      font-size: 9px;
      cursor: pointer;
      margin-left: 4px;
      vertical-align: middle;
      flex-shrink: 0;
      transition: all 0.2s;
      font-style: normal;
      line-height: 1;
      position: relative;
      top: -1px;
    }
    .info-icon:hover { border-color: var(--accent2); color: var(--accent2); }
    .tooltip-popup {
      display: none;
      position: fixed;
      background: var(--surface2);
      border: 1px solid var(--accent2);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 11px;
      color: var(--text);
      max-width: 260px;
      z-index: 9999;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
      line-height: 1.6;
      pointer-events: none;
    }
    .tooltip-popup.visible { display: block; }
    .tooltip-popup .tt-title { color: var(--accent2); font-size: 10px; letter-spacing: 0.5px; margin-bottom: 4px; }
    .tooltip-popup .tt-formula {
      background: rgba(124,106,247,0.1);
      border-radius: 4px;
      padding: 4px 8px;
      font-family: 'DM Mono', monospace;
      color: var(--accent);
      margin-top: 4px;
      font-size: 10px;
    }

    /* EVENT IMPACT */
    .event-impact-section {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      background: rgba(200,241,53,0.03);
    }
    .event-impact-item {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      margin-bottom: 8px;
    }
    .event-impact-item:last-child { margin-bottom: 0; }
    .event-impact-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }
    .event-impact-name { font-size: 11px; font-weight: 500; color: var(--accent); }
    .event-impact-date { font-size: 11px; color: var(--muted); }
    .event-impact-body { font-size: 11px; color: var(--text); line-height: 1.6; margin-bottom: 6px; }
    .event-impact-strategy {
      font-size: 10px;
      padding: 4px 10px;
      border-radius: 4px;
      background: rgba(124,106,247,0.1);
      color: var(--accent2);
      display: inline-block;
      margin-top: 4px;
    }
    .event-days-badge {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 4px;
      background: rgba(251,191,36,0.1);
      color: var(--warn);
      border: 1px solid rgba(251,191,36,0.2);
    }

    /* SHORT WARNING */
    .short-warning {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 14px;
      background: rgba(248,113,113,0.08);
      border: 1px solid rgba(248,113,113,0.25);
      border-radius: 8px;
      margin: 0 20px 12px;
    }
    .short-warning-icon { font-size: 16px; flex-shrink: 0; }
    .short-warning-text { font-size: 11px; color: var(--down); line-height: 1.6; }
    .short-warning-confidence {
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 3px;
      background: rgba(248,113,113,0.15);
      color: var(--down);
      margin-left: 6px;
    }

    /* RECOMMENDATIONS */
    .rec-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      margin-top: 16px;
    }
    .rec-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 18px;
      transition: border-color 0.2s;
    }
    .rec-card:hover { border-color: var(--accent); }
    .rec-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
    .rec-ticker { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; }
    .rec-company { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .rec-badges { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
    .rec-badge {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 4px;
      border: 1px solid var(--border);
      color: var(--muted);
    }
    .risk-low { border-color: rgba(74,222,128,0.3); color: var(--up); }
    .risk-medium { border-color: rgba(251,191,36,0.3); color: var(--warn); }
    .risk-high { border-color: rgba(248,113,113,0.3); color: var(--down); }
    .rec-reason { font-size: 12px; color: var(--text); line-height: 1.6; margin-bottom: 10px; }
    .rec-catalysts { list-style: none; }
    .rec-catalysts li { font-size: 11px; color: var(--muted); padding: 2px 0; }
    .rec-catalysts li::before { content: "→ "; color: var(--accent); }
    .market-context {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 18px;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 20px;
      line-height: 1.6;
    }
    .market-context strong { color: var(--text); }

    /* FOLLOW-UP MODAL */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 1000;
      backdrop-filter: blur(4px);
    }
    .modal-overlay.visible { display: flex; align-items: center; justify-content: center; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      width: 680px;
      max-width: 95vw;
      max-height: 85vh;
      overflow-y: auto;
      padding: 28px;
      position: relative;
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 20px;
    }
    .modal-title { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; }
    .modal-subtitle { font-size: 11px; color: var(--muted); margin-top: 4px; }
    .modal-close {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      cursor: pointer;
      font-size: 16px;
      border-radius: 6px;
      padding: 4px 10px;
      transition: all 0.2s;
    }
    .modal-close:hover { color: var(--down); border-color: var(--down); }
    .modal-loading { text-align: center; padding: 40px; color: var(--muted); }
    .modal-step {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
      margin-bottom: 10px;
      position: relative;
    }
    .modal-step-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .modal-step-date {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 4px;
      background: rgba(200,241,53,0.1);
      color: var(--accent);
      border: 1px solid rgba(200,241,53,0.2);
    }
    .modal-step-title { font-size: 13px; font-weight: 500; }
    .modal-step-fetch {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 4px;
      background: rgba(124,106,247,0.1);
      color: var(--accent2);
      border: 1px solid rgba(124,106,247,0.2);
    }
    .modal-step-instructions { font-size: 12px; color: var(--text); line-height: 1.7; margin-bottom: 8px; }
    .modal-step-sources { display: flex; flex-wrap: wrap; gap: 6px; }
    .modal-step-source {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 4px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
    }
    .modal-flags { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 16px 0; }
    .modal-flag-section { }
    .modal-flag-title { font-size: 10px; letter-spacing: 1px; margin-bottom: 8px; }
    .modal-flag-title.red { color: var(--down); }
    .modal-flag-title.green { color: var(--up); }
    .modal-flag-list { list-style: none; }
    .modal-flag-list li { font-size: 11px; color: var(--muted); padding: 3px 0; }
    .modal-flag-list.red li::before { content: "✗ "; color: var(--down); }
    .modal-flag-list.green li::before { content: "✓ "; color: var(--up); }
    .modal-decision {
      background: rgba(200,241,53,0.05);
      border: 1px solid rgba(200,241,53,0.2);
      border-radius: 8px;
      padding: 12px 16px;
      margin-top: 16px;
      font-size: 12px;
    }
    .modal-decision-label { font-size: 10px; color: var(--accent); letter-spacing: 1px; margin-bottom: 4px; }

    /* PRICE CONTEXT */
    .price-context-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 14px;
    }
    .price-context-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      text-align: center;
    }
    .price-context-label { font-size: 10px; color: var(--muted); letter-spacing: 0.5px; margin-bottom: 4px; }
    .price-context-value { font-size: 14px; font-weight: 600; font-family: 'Syne', sans-serif; }
    .confirmation-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 14px;
    }
    .confirmation-badge.CONFIRMS { background: rgba(74,222,128,0.1); color: var(--up); border: 1px solid rgba(74,222,128,0.3); }
    .confirmation-badge.CONTRADICTS { background: rgba(248,113,113,0.1); color: var(--down); border: 1px solid rgba(248,113,113,0.3); }
    .confirmation-badge.MIXED { background: rgba(251,191,36,0.1); color: var(--warn); border: 1px solid rgba(251,191,36,0.3); }
    .rsi-bar-wrap { margin-bottom: 14px; }
    .rsi-bar-label { font-size: 11px; color: var(--muted); margin-bottom: 6px; display: flex; justify-content: space-between; }
    .rsi-bar-track { height: 6px; background: var(--surface2); border-radius: 3px; position: relative; overflow: hidden; }
    .rsi-bar-fill { height: 100%; border-radius: 3px; transition: width 0.5s; }

    /* NEWS */
    .news-sentiment-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 16px;
    }
    .news-sentiment-bar.bullish { background: rgba(74,222,128,0.08); border: 1px solid rgba(74,222,128,0.2); }
    .news-sentiment-bar.bearish { background: rgba(248,113,113,0.08); border: 1px solid rgba(248,113,113,0.2); }
    .news-sentiment-bar.neutral { background: rgba(107,107,128,0.08); border: 1px solid var(--border); }
    .news-score {
      font-family: 'Syne', sans-serif;
      font-size: 28px;
      font-weight: 800;
      min-width: 48px;
      text-align: center;
    }
    .news-score.positive { color: var(--up); }
    .news-score.negative { color: var(--down); }
    .news-score.neutral-score { color: var(--muted); }
    .news-sentiment-info { flex: 1; }
    .news-sentiment-label { font-size: 12px; font-weight: 500; margin-bottom: 4px; }
    .news-summary-text { font-size: 12px; color: var(--muted); line-height: 1.6; }
    .news-meta-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 16px;
    }
    .news-meta-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
    }
    .news-meta-label { font-size: 11px; color: var(--muted); margin-bottom: 4px; letter-spacing: 0.5px; }
    .news-meta-value { font-size: 12px; color: var(--text); line-height: 1.5; }
    .news-themes { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
    .news-theme {
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 20px;
      background: rgba(124,106,247,0.1);
      border: 1px solid rgba(124,106,247,0.2);
      color: var(--accent2);
    }
    .news-divider {
      font-size: 11px;
      letter-spacing: 1px;
      color: var(--muted);
      text-transform: uppercase;
      margin: 16px 0 10px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }
    .news-item {
      padding: 12px 14px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 8px;
    }
    .news-item:last-child { margin-bottom: 0; }
    .news-item-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 6px;
    }
    .news-item-title {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      line-height: 1.4;
      flex: 1;
    }
    .news-item-title a { color: var(--text); text-decoration: none; }
    .news-item-title a:hover { color: var(--accent); }
    .news-impact-badge {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 4px;
      flex-shrink: 0;
    }
    .news-impact-badge.positive { background: rgba(74,222,128,0.1); color: var(--up); border: 1px solid rgba(74,222,128,0.2); }
    .news-impact-badge.negative { background: rgba(248,113,113,0.1); color: var(--down); border: 1px solid rgba(248,113,113,0.2); }
    .news-impact-badge.neutral { background: rgba(107,107,128,0.1); color: var(--muted); border: 1px solid var(--border); }
    .news-item-meta { font-size: 11px; color: var(--muted); margin-bottom: 6px; }
    .news-item-summary { font-size: 12px; color: var(--muted); line-height: 1.6; margin-bottom: 6px; }
    .news-item-impact { font-size: 12px; color: var(--text); font-style: italic; }
    .news-sig-high { color: var(--accent); }
    .news-sig-medium { color: var(--warn); }
    .news-sig-low { color: var(--muted); }

    /* SCROLLBAR */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    @media (max-width: 1200px) {
      .stocks-grid { grid-template-columns: 1fr; }
      .summary-row { grid-template-columns: repeat(2,1fr); }
    }
  </style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="logo">STOCK<span>.</span>AI</div>
    <div class="status-pill" id="statusPill">IDLE</div>
    <span class="status-dot" id="statusDot"></span>
    <span id="statusText" style="font-size:11px;color:var(--muted)">{{ status.message }}</span>
  </div>
  <div class="header-actions">
    <div id="lastUpdated" style="font-size:11px;color:var(--muted);margin-right:6px"></div>
    <a href="/logs" class="btn" target="_blank">LOGS</a>
    <a href="/fetch/new" class="btn">+ FETCH NEW</a>
    <a href="/fetch/smart" class="btn" style="border-color:var(--warn);color:var(--warn)">⚡ SMART REFRESH</a>
    <a href="/fetch" class="btn btn-primary">↺ FETCH ALL</a>
  </div>
</div>

<div class="watchlist-bar">
  {% for ticker in watchlist %}
  <span class="ticker-tag">
    {{ ticker }}
    <a href="/remove/{{ ticker }}">✕</a>
  </span>
  {% endfor %}
  <form class="add-form" method="POST" action="/add">
    <input name="ticker" placeholder="ADD TICKER" maxlength="8" />
    <button type="submit" class="btn">+ ADD</button>
  </form>
</div>

<div class="tabs">
  <div class="tab active" onclick="showTab('watchlist', this)">WATCHLIST</div>
  <div class="tab" onclick="showTab('gainers', this)">DAILY GAINERS</div>
  <div class="tab" onclick="showTab('peers', this)">PEER RANKINGS</div>
  <div class="tab" onclick="showTab('recommendations', this)">BUY RECOMMENDATIONS</div>
</div>

<div class="content">

  <div class="tab-panel active" id="tab-watchlist">
    <div id="watchlistContent"><div class="loading">Loading analysis data...</div></div>
  </div>

  <div class="tab-panel" id="tab-gainers">
    <div id="gainersContent"><div class="loading">Loading gainers...</div></div>
  </div>

  <div class="tab-panel" id="tab-peers">
    <div id="peersContent"><div class="loading">Loading peer rankings...</div></div>
  </div>

  <div class="tab-panel" id="tab-recommendations">
    <div id="recommendationsContent"><div class="loading">Loading recommendations...</div></div>
  </div>

</div>



<div class="tooltip-popup" id="tooltipPopup">
  <div class="tt-title" id="ttTitle"></div>
  <div id="ttDesc"></div>
  <div class="tt-formula" id="ttFormula"></div>
</div>

<script>
const TOOLTIPS = {
  annualMargin: {
    title: "ANNUAL PROFIT MARGIN",
    desc: "How much of annual revenue becomes net income.",
    formula: "Annual Net Income ÷ Annual Revenue"
  },
  qMargin: {
    title: "QUARTERLY PROFIT MARGIN",
    desc: "Same as annual margin but for the latest quarter.",
    formula: "Latest Q Net Income ÷ Latest Q Revenue"
  },
  netCash: {
    title: "NET CASH",
    desc: "Cash remaining after paying off all debt. Positive = net cash positive.",
    formula: "Total Cash − Total Debt"
  },
  fcf: {
    title: "FREE CASH FLOW (FCF)",
    desc: "Cash generated after capital expenditures. Latest quarter.",
    formula: "Operating Cash Flow − CapEx"
  },
  capex: {
    title: "CAPITAL EXPENDITURE",
    desc: "Money spent on physical assets like mines and equipment. Latest quarter.",
    formula: "From cash flow statement"
  },
  ocf: {
    title: "OPERATING CASH FLOW",
    desc: "Cash generated from core business operations. Latest quarter.",
    formula: "From cash flow statement"
  },
  revenueQoQ: {
    title: "REVENUE QoQ",
    desc: "Revenue change vs previous quarter.",
    formula: "(Q0 − Q1) ÷ |Q1|"
  },
  revenueYoY: {
    title: "REVENUE YoY (SAME QUARTER)",
    desc: "Revenue change vs same quarter last year.",
    formula: "(Q0 − Q4) ÷ |Q4|"
  },
  netIncomeQoQ: {
    title: "NET INCOME QoQ",
    desc: "Net income change vs previous quarter.",
    formula: "(Q0 − Q1) ÷ |Q1|"
  },
  netIncomeYoY: {
    title: "NET INCOME YoY (SAME QUARTER)",
    desc: "Net income change vs same quarter last year.",
    formula: "(Q0 − Q4) ÷ |Q4|"
  },
  annualYoY1: {
    title: "ANNUAL YoY (FY2025 vs FY2024)",
    desc: "Full year comparison between most recent and prior year.",
    formula: "(FY2025 − FY2024) ÷ |FY2024|"
  },
  annualYoY2: {
    title: "ANNUAL YoY (FY2024 vs FY2023)",
    desc: "Full year comparison between prior and two years ago.",
    formula: "(FY2024 − FY2023) ÷ |FY2023|"
  },
  fcfQoQ: {
    title: "FCF QoQ",
    desc: "Free cash flow change vs previous quarter.",
    formula: "(Q0 FCF − Q1 FCF) ÷ |Q1 FCF|"
  },
  fcfYoY: {
    title: "FCF YoY (SAME QUARTER)",
    desc: "Free cash flow change vs same quarter last year.",
    formula: "(Q0 FCF − Q4 FCF) ÷ |Q4 FCF|"
  },
  marginRank: {
    title: "MARGIN RANK",
    desc: "Ranked by annual profit margin across all watchlist peers.",
    formula: "#1 = highest annual profit margin"
  },
  netCashRank: {
    title: "NET CASH RANK",
    desc: "Ranked by net cash position across all watchlist peers.",
    formula: "#1 = highest (Cash − Debt)"
  },
  marketCapRank: {
    title: "MARKET CAP RANK",
    desc: "Ranked by market capitalization across all watchlist peers.",
    formula: "#1 = largest market cap"
  },
  fcfRank: {
    title: "FCF RANK",
    desc: "Ranked by latest quarterly free cash flow across all watchlist peers.",
    formula: "#1 = highest FCF"
  },
};

const popup = document.getElementById('tooltipPopup');

function showTooltip(el, key, vals) {
  const t = TOOLTIPS[key];
  if (!t) return;
  document.getElementById('ttTitle').textContent = t.title;
  document.getElementById('ttDesc').textContent = t.desc;
  document.getElementById('ttFormula').textContent = vals ? t.formula + '\n= ' + vals : t.formula;
  popup.classList.add('visible');
  positionTooltip(el);
}

function hideTooltip() {
  popup.classList.remove('visible');
}

function positionTooltip(el) {
  const rect = el.getBoundingClientRect();
  const pw = 280;
  let left = rect.right + 8;
  let top = rect.top - 10;
  if (left + pw > window.innerWidth) left = rect.left - pw - 8;
  if (top + 100 > window.innerHeight) top = window.innerHeight - 120;
  popup.style.left = left + 'px';
  popup.style.top = top + 'px';
}

function infoIcon(key, vals) {
  const v = vals ? `,'${String(vals).replace(/'/g, "\\'")}'` : '';
  return `<i class="info-icon" onclick="showTooltip(this,'${key}'${v})" onmouseleave="hideTooltip()">ⓘ</i>`;
}

function fmt(n) {
  if (n == null) return '—';
  const abs = Math.abs(n);
  if (abs >= 1e9) return (n/1e9).toFixed(2) + 'B';
  if (abs >= 1e6) return (n/1e6).toFixed(1) + 'M';
  if (abs >= 1e3) return (n/1e3).toFixed(1) + 'K';
  return n.toFixed(2);
}
function fmtPct(n) {
  if (n == null) return '—';
  const val = (n * 100).toFixed(1);
  return (n >= 0 ? '+' : '') + val + '%';
}
function pctClass(n) {
  if (n == null) return 'neutral';
  return n >= 0 ? 'up' : 'down';
}
function sentimentClass(s) {
  if (!s) return 'sentiment-neutral';
  if (s.toLowerCase().includes('bull')) return 'sentiment-bullish';
  if (s.toLowerCase().includes('bear')) return 'sentiment-bearish';
  return 'sentiment-neutral';
}

// Collapsible Helper
function toggleSection(el) {
  const section = el.closest('.card-section');
  section.classList.toggle('expanded');
  const btn = section.querySelector('.section-toggle');
  if (section.classList.contains('expanded')) {
    btn.textContent = '−';
  } else {
    btn.textContent = '+';
  }
}

function renderWatchlist(data) {
  const stocks = data.watchlist || [];
  if (!stocks.length) return '<div class="loading">No data yet. Click FETCH DATA.</div>';

  const summaryHTML = `
    <div class="summary-row">
      <div class="summary-card">
        <div class="label">STOCKS TRACKED</div>
        <div class="value">${stocks.length}</div>
        <div class="sub">in watchlist</div>
      </div>
      <div class="summary-card">
        <div class="label">TOTAL MARKET CAP</div>
        <div class="value">$${fmt(stocks.reduce((a,s)=>a+(s.marketCap||0),0))}</div>
        <div class="sub">combined</div>
      </div>
      <div class="summary-card">
        <div class="label">BEST MARGIN</div>
        <div class="value">${(() => { const s = stocks.find(s=>s.marginRank===1); return s ? s.ticker : '—'; })()}</div>
        <div class="sub">${(() => { const s = stocks.find(s=>s.marginRank===1); return s ? fmtPct(s.annualProfitMargin) : '—'; })()} annual</div>
      </div>
      <div class="summary-card">
        <div class="label">BEST NET CASH</div>
        <div class="value">${(() => { const s = stocks.find(s=>s.netCashRank===1); return s ? s.ticker : '—'; })()}</div>
        <div class="sub">$${(() => { const s = stocks.find(s=>s.netCashRank===1); return s ? fmt(s.netCash) : '—'; })()} net</div>
      </div>
    </div>`;

  const cardsHTML = stocks.map(s => {
    const ai = s.aiSummary || {};
    const qIncome = (s.quarterlyIncome || []).slice(0, 5);
    const aIncome = s.annualIncome || [];
    const aCashflow = s.annualCashflow || [];
    const cal = s.calendar || {};
    const ev = s.events || {};
    const qc = s.quarterlyChanges || {};
    const ac = s.annualChanges || {};
    const latest = qIncome[0] || {};
    const annual = aIncome[0] || {};
    const cashflow = aCashflow[0] || {};

    return `
    <div class="stock-card">
      <div class="card-header">
        <div>
          <div class="ticker-name">${s.ticker}</div>
          <div class="ticker-meta">${s.industry || s.sector || '—'}</div>
          ${s.fetchedAt ? `<div class="ticker-meta" style="margin-top:4px;color:var(--muted)">🕐 ${s.fetchedAt} <a href="/fetch/ticker/${s.ticker}" style="color:var(--accent2);text-decoration:none;margin-left:6px;font-size:10px">↺ REFRESH</a></div>` : ''}
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px">
          <div class="price-block">
            <div class="price">$${s.price != null ? s.price.toFixed(2) : '—'}</div>
            <div class="mktcap">MCap $${fmt(s.marketCap)}</div>
          </div>
          <div style="display:flex;gap:6px">
            <button class="btn" style="font-size:11px;padding:4px 10px;border-color:var(--accent);color:var(--accent)"
              onclick="getNews('${s.ticker}', this, false)">📰 7D</button>
            <button class="btn" style="font-size:11px;padding:4px 10px;border-color:var(--warn);color:var(--warn)"
              onclick="getNews('${s.ticker}', this, true)">📰 TODAY</button>
          </div>
        </div>
      </div>

      <div class="ranks-row">
        ${s.marginRank ? `<span class="rank-badge rank-${s.marginRank}">MARGIN #${s.marginRank} ${infoIcon('marginRank')}</span>` : ''}
        ${s.netCashRank ? `<span class="rank-badge rank-${s.netCashRank}">NET CASH #${s.netCashRank} ${infoIcon('netCashRank')}</span>` : ''}
        ${s.marketCapRank ? `<span class="rank-badge rank-${s.marketCapRank}">MCAP #${s.marketCapRank} ${infoIcon('marketCapRank')}</span>` : ''}
        ${s.fcfRank ? `<span class="rank-badge rank-${s.fcfRank}">FCF #${s.fcfRank} ${infoIcon('fcfRank')}</span>` : ''}
      </div>

      ${ai.shortWarning && ai.shortWarning.shouldShort ? `
      <div class="short-warning">
        <div class="short-warning-icon">⚠️</div>
        <div class="short-warning-text">
          <strong>SHORT SIGNAL</strong>
          <span class="short-warning-confidence">${(ai.shortWarning.confidence||'').toUpperCase()}</span><br/>
          ${ai.shortWarning.reason || ''}
        </div>
      </div>` : ''}

      ${ai.eventImpacts && ai.eventImpacts.length ? `
      <div class="event-impact-section">
        <div class="section-title" style="margin-bottom:10px">UPCOMING EVENT IMPACT</div>
        ${ai.eventImpacts.map(e => `
        <div class="event-impact-item">
          <div class="event-impact-header">
            <span class="event-impact-name">${e.event || ''}</span>
            <div style="display:flex;gap:6px;align-items:center">
              ${e.startWatchingDate ? `<span class="event-days-badge">Start watching: ${e.startWatchingDate}</span>` : ''}
              <span class="event-impact-date">${e.date || ''}</span>
            </div>
          </div>
          <div class="event-impact-body">${e.expectedImpact || ''}</div>
          ${e.epsEstimate ? `<div style="font-size:11px;margin:4px 0;color:var(--text)">📊 EPS Est: <strong>${e.epsEstimate}</strong></div>` : ''}
          ${e.revenueEstimate ? `<div style="font-size:11px;margin:4px 0;color:var(--text)">💰 Rev Est: <strong>${e.revenueEstimate}</strong></div>` : ''}
          ${e.whatToWatchFor && e.whatToWatchFor.length ? `
          <div style="margin-top:8px">
            <div style="font-size:10px;color:var(--muted);letter-spacing:0.5px;margin-bottom:4px">WATCH FOR:</div>
            <ul class="ai-list">${e.whatToWatchFor.map(w=>`<li>${w}</li>`).join('')}</ul>
          </div>` : ''}
          ${e.whereToMonitor && e.whereToMonitor.length ? `
          <div style="margin-top:8px;display:flex;flex-wrap:wrap;gap:4px">
            ${e.whereToMonitor.map(w=>`<span class="modal-step-source">${w}</span>`).join('')}
          </div>` : ''}
          ${e.actionPlan && e.actionPlan.length ? `
          <div style="margin-top:10px">
            <div style="font-size:10px;color:var(--muted);letter-spacing:0.5px;margin-bottom:6px">ACTION PLAN:</div>
            ${e.actionPlan.map(a=>`
            <div style="display:flex;gap:8px;align-items:flex-start;padding:4px 0;border-bottom:1px solid rgba(42,42,58,0.5)">
              <span class="modal-step-date" style="flex-shrink:0">${a.date||''}</span>
              <span style="font-size:11px;color:var(--text)">${a.action||''}</span>
            </div>`).join('')}
          </div>` : ''}
          <div style="display:flex;justify-content:space-between;align-items:center;margin-top:10px">
            ${e.strategy ? `<span class="event-impact-strategy">→ ${e.strategy}</span>` : '<span></span>'}
            <button class="btn" style="font-size:10px;padding:4px 12px;border-color:var(--accent2);color:var(--accent2)"
              onclick="getFollowupPlan('${s.ticker}', '${(e.event||'').replace(/'/g,"\\'")}', this)">
              🤖 GET FOLLOW-UP PLAN
            </button>
          </div>
        </div>`).join('')}
      </div>` : ''}

      ${ai.highlight ? `
      <div class="card-section">
        <div class="section-title" onclick="toggleSection(this)">AI SUMMARY</div>
        <span class="section-toggle" onclick="toggleSection(this)">+</span>
        <div class="section-content">
            <span class="ai-tag ${sentimentClass(ai.analystSentiment)}">${(ai.analystSentiment||'neutral').toUpperCase()}</span>
            <div class="ai-highlight">${ai.highlight}</div>
            ${ai.riskFactors && ai.riskFactors.length ? `
            <div class="section-title" style="margin-top:10px">RISK FACTORS</div>
            <ul class="ai-list">${ai.riskFactors.map(r=>`<li>${r}</li>`).join('')}</ul>
            ` : ''}
            ${ai.majorGrowthProjects && ai.majorGrowthProjects.length ? `
            <div class="section-title" style="margin-top:10px">GROWTH CATALYSTS</div>
            <ul class="ai-list">${ai.majorGrowthProjects.map(p=>`<li>${p}</li>`).join('')}</ul>
            ` : ''}
        </div>
      </div>` : ''}

      <div class="card-section">
        <div class="section-title" onclick="toggleSection(this)">KEY METRICS</div>
        <span class="section-toggle" onclick="toggleSection(this)">+</span>
        <div class="section-content">
            <div class="metrics-grid">
            <div class="metric">
                <div class="m-label">ANNUAL MARGIN ${infoIcon('annualMargin', `$${fmt(annual['Net Income'])} ÷ $${fmt(annual['Total Revenue'])} = ${s.annualProfitMargin != null ? (s.annualProfitMargin*100).toFixed(1)+'%' : '—'}`)}</div>
                <div class="m-value">${s.annualProfitMargin != null ? (s.annualProfitMargin*100).toFixed(1)+'%' : '—'}</div>
                <div class="m-change ${pctClass(ac.netIncome_yoy_1)}">${fmtPct(ac.netIncome_yoy_1)} YoY ${infoIcon('annualYoY1', ac.netIncome_yoy_1 != null ? fmtPct(ac.netIncome_yoy_1) : '—')}</div>
            </div>
            <div class="metric">
                <div class="m-label">NET CASH ${infoIcon('netCash', `$${fmt((s.annualBalance||[{}])[0]['Cash And Cash Equivalents'])} − $${fmt((s.annualBalance||[{}])[0]['Total Debt'])} = $${fmt(s.netCash)}`)}</div>
                <div class="m-value ${s.netCash >= 0 ? 'up' : 'down'}">$${fmt(s.netCash)}</div>
            </div>
            <div class="metric">
                <div class="m-label">LATEST FCF ${infoIcon('fcf', `$${fmt(s.latestOCF)} − $${fmt(s.latestCapex)} = $${fmt(s.latestFCF)}`)}</div>
                <div class="m-value">$${fmt(s.latestFCF)}</div>
                <div class="m-change ${pctClass(qc.fcf_qoq)}">${fmtPct(qc.fcf_qoq)} QoQ ${infoIcon('fcfQoQ', `Q0=$${fmt(qIncome[0] && qIncome[0]['Free Cash Flow'])} Q1=$${fmt(qIncome[1] && qIncome[1]['Free Cash Flow'])}`)}</div>
            </div>
            <div class="metric">
                <div class="m-label">Q REVENUE ${infoIcon('revenueQoQ', `Q0=$${fmt(latest['Total Revenue'])} Q1=$${fmt((qIncome[1]||{})['Total Revenue'])}`)}</div>
                <div class="m-value">$${fmt(latest['Total Revenue'])}</div>
                <div class="m-change ${pctClass(qc.revenue_qoq)}">${fmtPct(qc.revenue_qoq)} QoQ</div>
                <div class="m-change ${pctClass(qc.revenue_yoy)}">${fmtPct(qc.revenue_yoy)} YoY ${infoIcon('revenueYoY', `Q0=$${fmt(latest['Total Revenue'])} Q4=$${fmt((s.quarterlyIncome||[])[3] && (s.quarterlyIncome||[])[3]['Total Revenue'])}`)}</div>
            </div>
            <div class="metric">
                <div class="m-label">Q NET INCOME ${infoIcon('netIncomeQoQ', `Q0=$${fmt(latest['Net Income'])} Q1=$${fmt((qIncome[1]||{})['Net Income'])}`)}</div>
                <div class="m-value">$${fmt(latest['Net Income'])}</div>
                <div class="m-change ${pctClass(qc.netIncome_qoq)}">${fmtPct(qc.netIncome_qoq)} QoQ</div>
                <div class="m-change ${pctClass(qc.netIncome_yoy)}">${fmtPct(qc.netIncome_yoy)} YoY ${infoIcon('netIncomeYoY', `Q0=$${fmt(latest['Net Income'])} Q4=$${fmt((s.quarterlyIncome||[])[3] && (s.quarterlyIncome||[])[3]['Net Income'])}`)}</div>
            </div>
            <div class="metric">
                <div class="m-label">CAPEX ${infoIcon('capex', `Latest Q: $${fmt(s.latestCapex)}`)}</div>
                <div class="m-value">$${fmt(s.latestCapex)}</div>
            </div>
            </div>
        </div>
      </div>

      <div class="card-section">
        <div class="section-title" onclick="toggleSection(this)">QUARTERLY INCOME</div>
        <span class="section-toggle" onclick="toggleSection(this)">+</span>
        <div class="section-content">
            <table class="fin-table">
            <tr>
                <th>METRIC</th>
                ${qIncome.map(q=>`<th>${q.date}</th>`).join('')}
            </tr>
            ${['Total Revenue','Gross Profit','Operating Income','Net Income','EBITDA'].map(field=>`
            <tr>
                <td>${field}</td>
                ${qIncome.map(q=>`<td>$${fmt(q[field])}</td>`).join('')}
            </tr>`).join('')}
            </table>
        </div>
      </div>

      <div class="card-section">
        <div class="section-title" onclick="toggleSection(this)">ANNUAL INCOME</div>
        <span class="section-toggle" onclick="toggleSection(this)">+</span>
        <div class="section-content">
            <table class="fin-table">
            <tr>
                <th>METRIC</th>
                ${aIncome.map(a=>`<th>${a.date}</th>`).join('')}
            </tr>
            ${['Total Revenue','Gross Profit','Operating Income','Net Income','Free Cash Flow'].map(field=>`
            <tr>
                <td>${field === 'Free Cash Flow' ? 'FCF' : field}</td>
                ${field === 'Free Cash Flow'
                ? (s.annualCashflow||[]).map(c=>`<td>$${fmt(c[field])}</td>`).join('')
                : aIncome.map(a=>`<td>$${fmt(a[field])}</td>`).join('')
                }
            </tr>`).join('')}
            </table>
        </div>
      </div>

      <div class="card-section">
        <div class="section-title" onclick="toggleSection(this)">UPCOMING EVENTS</div>
        <span class="section-toggle" onclick="toggleSection(this)">+</span>
        <div class="section-content">
            <div class="events-list">
            ${cal.earningsDateStart ? `
            <div class="event-item">
                <div>
                <div class="event-label">EARNINGS DATE</div>
                <div class="event-estimate">EPS est: $${cal.earningsEPSAvg?.toFixed(2)||'—'} | Rev est: $${fmt(cal.revenueEstimateAvg)}</div>
                </div>
                <div class="event-value">${cal.earningsDateStart}</div>
            </div>` : ''}
            ${cal.exDividendDate ? `
            <div class="event-item">
                <div class="event-label">EX-DIVIDEND DATE</div>
                <div class="event-value">${cal.exDividendDate}</div>
            </div>` : ''}
            ${cal.dividendPayDate ? `
            <div class="event-item">
                <div class="event-label">DIVIDEND PAY DATE</div>
                <div class="event-value">${cal.dividendPayDate}</div>
            </div>` : ''}
            ${ev.dividendRate ? `
            <div class="event-item">
                <div class="event-label">DIVIDEND RATE / YIELD</div>
                <div class="event-value">$${ev.dividendRate} / ${ev.dividendYield != null ? (ev.dividendYield).toFixed(2)+'%' : '—'}</div>
            </div>` : ''}
            ${ev.earningsCallStart ? `
            <div class="event-item">
                <div class="event-label">EARNINGS CALL</div>
                <div class="event-value">${ev.earningsCallStart}</div>
            </div>` : ''}
            </div>
        </div>
      </div>

      ${s.dividends && s.dividends.length ? `
      <div class="card-section">
        <div class="section-title" onclick="toggleSection(this)">RECENT DIVIDENDS</div>
        <span class="section-toggle" onclick="toggleSection(this)">+</span>
        <div class="section-content">
            <table class="fin-table">
            <tr><th>DATE</th><th>AMOUNT</th></tr>
            ${s.dividends.map(d=>`<tr><td>${d.date.split(' ')[0]}</td><td>$${d.amount.toFixed(3)}</td></tr>`).join('')}
            </table>
        </div>
      </div>` : ''}

    </div>`;
  }).join('');

  return summaryHTML + `<div class="stocks-grid">${cardsHTML}</div>`;
}

function renderGainers(data) {
  const gainers = data.dailyGainers || [];
  if (!gainers.length) return '<div class="loading">No gainers data available.</div>';
  return `
    <table class="gainers-table">
      <thead>
        <tr>
          <th>#</th>
          <th>TICKER</th>
          <th>% GAIN</th>
          <th>PRICE</th>
          <th>VOLUME</th>
          <th>ACTION</th>
        </tr>
      </thead>
      <tbody>
        ${gainers.map((g,i)=>`
        <tr>
          <td class="rank-num">${i+1}</td>
          <td><strong>${g.ticker}</strong></td>
          <td class="gain-pct">+${g.percentGain?.toFixed(2)||'—'}%</td>
          <td>$${g.price?.toFixed(2)||'—'}</td>
          <td>${fmt(g.volume)}</td>
          <td>
            <form method="POST" action="/add" style="display:inline">
              <input type="hidden" name="ticker" value="${g.ticker}">
              <button type="submit" class="btn" style="padding: 2px 8px; font-size: 10px;">+ WATCH</button>
            </form>
          </td>
        </tr>`).join('')}
      </tbody>
    </table>`;
}

function renderRecommendations(data) {
  const rec = data.recommendations || {};
  const list = rec.recommendations || [];
  if (!list.length) return '<div class="loading">No recommendations yet — click FETCH ALL to generate.</div>';
  return `
    <div class="market-context"><strong>MARKET CONTEXT:</strong> ${rec.marketContext || '—'}</div>
    <div class="rec-grid">
      ${list.map(r => `
      <div class="rec-card">
        <div class="rec-header">
          <div>
            <div class="rec-ticker">${r.ticker}</div>
            <div class="rec-company">${r.companyName || ''}</div>
          </div>
          <form method="POST" action="/add" style="display:inline">
            <input type="hidden" name="ticker" value="${r.ticker}">
            <button type="submit" class="btn" style="padding:4px 10px;font-size:10px">+ WATCH</button>
          </form>
        </div>
        <div class="rec-badges">
          <span class="rec-badge risk-${(r.riskLevel||'medium').toLowerCase()}">${(r.riskLevel||'').toUpperCase()} RISK</span>
          <span class="rec-badge">${r.sector || ''}</span>
          <span class="rec-badge">${r.timeHorizon || ''}</span>
        </div>
        <div class="rec-reason">${r.reason || ''}</div>
        ${r.catalysts && r.catalysts.length ? `
        <ul class="rec-catalysts">
          ${r.catalysts.map(c=>`<li>${c}</li>`).join('')}
        </ul>` : ''}
      </div>`).join('')}
    </div>`;
}

function renderPeers(data) {
  const stocks = data.watchlist || [];
  if (!stocks.length) return '<div class="loading">No data yet.</div>';

  const categories = [
    { key: 'annualProfitMargin', rankKey: 'marginRank', label: 'PROFIT MARGIN', fmt: v => v != null ? (v*100).toFixed(1)+'%' : '—' },
    { key: 'netCash', rankKey: 'netCashRank', label: 'NET CASH', fmt: v => '$'+fmt(v) },
    { key: 'marketCap', rankKey: 'marketCapRank', label: 'MARKET CAP', fmt: v => '$'+fmt(v) },
    { key: 'latestFCF', rankKey: 'fcfRank', label: 'FREE CASH FLOW', fmt: v => '$'+fmt(v) },
  ];

  return `<div class="peer-grid">${categories.map(cat => {
    const sorted = [...stocks].filter(s=>s[cat.key]!=null).sort((a,b)=>b[cat.key]-a[cat.key]);
    return `
    <div class="peer-card">
      <div class="peer-title">${cat.label}</div>
      ${sorted.map((s,i)=>`
      <div class="peer-row">
        <span class="peer-rank r${i+1}">${i+1}</span>
        <span class="peer-ticker">${s.ticker}</span>
        <span class="peer-val">${cat.fmt(s[cat.key])}</span>
      </div>`).join('')}
    </div>`;
  }).join('')}</div>`;
}

function showTab(name, el) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab-'+name).classList.add('active');
}

let dataLoaded = false;
let wasRunning = false;
let pendingReload = false;

async function loadData() {
  try {
    const res = await fetch('/data');
    const data = await res.json();
    document.getElementById('watchlistContent').innerHTML = renderWatchlist(data);
    document.getElementById('gainersContent').innerHTML = renderGainers(data);
    document.getElementById('peersContent').innerHTML = renderPeers(data);
    document.getElementById('recommendationsContent').innerHTML = renderRecommendations(data);
    if (data.lastUpdated) {
      document.getElementById('lastUpdated').textContent = 'Last updated: ' + data.lastUpdated;
    }
    dataLoaded = true;
  } catch(e) {
    if (!dataLoaded) {
      document.getElementById('watchlistContent').innerHTML = '<div class="loading">No data yet — click FETCH DATA to begin.</div>';
    }
  }
}

async function pollStatus() {
  try {
    const res = await fetch('/status');
    const s = await res.json();
    document.getElementById('statusText').textContent = s.message;
    document.getElementById('statusPill').textContent = s.running ? 'RUNNING' : 'IDLE';
    document.getElementById('statusPill').className = 'status-pill' + (s.running ? ' running' : '');
    document.getElementById('statusDot').className = 'status-dot' + (s.running ? ' running' : '');
    if (wasRunning && !s.running) loadData();
    wasRunning = s.running;
  } catch(e) {}
}

async function getFollowupPlan(ticker, eventName, btn) {
  const modal = document.getElementById('followupModal');
  const body = document.getElementById('followupBody');
  const title = document.getElementById('followupTitle');
  const subtitle = document.getElementById('followupSubtitle');
  title.textContent = ticker + ' — ' + eventName;
  subtitle.textContent = 'Generating AI follow-up plan...';
  body.innerHTML = '<div class="modal-loading">🤖 AI is generating your step-by-step plan...<br><span style="font-size:11px;color:var(--muted)">This may take 30-60 seconds</span></div>';
  modal.classList.add('visible');
  btn.textContent = '⏳ Loading...';
  btn.disabled = true;
  try {
    const res = await fetch(`/followup/${ticker}/${encodeURIComponent(eventName)}`);
    const plan = await res.json();
    if (plan.error) {
      body.innerHTML = `<div class="modal-loading" style="color:var(--down)">Error: ${plan.error}</div>`;
      return;
    }
    subtitle.textContent = plan.summary || '';
    let html = '';
    if (plan.steps && plan.steps.length) {
      html += '<div style="margin-bottom:16px">';
      plan.steps.forEach(step => {
        html += `
        <div class="modal-step">
          <div class="modal-step-header">
            <span class="modal-step-title">${step.title||''}</span>
            <div style="display:flex;gap:6px">
              ${step.fetchRequired ? `<span class="modal-step-fetch">↺ FETCH REQUIRED</span>` : ''}
              <span class="modal-step-date">${step.date||''}</span>
            </div>
          </div>
          <div class="modal-step-instructions">${step.instructions||''}</div>
          ${step.sources && step.sources.length ? `
          <div class="modal-step-sources">
            ${step.sources.map(s=>`<span class="modal-step-source">${s}</span>`).join('')}
          </div>` : ''}
        </div>`;
      });
      html += '</div>';
    }
    if (plan.redFlags || plan.greenFlags) {
      html += '<div class="modal-flags">';
      if (plan.redFlags && plan.redFlags.length) {
        html += `<div class="modal-flag-section">
          <div class="modal-flag-title red">⚠ RED FLAGS</div>
          <ul class="modal-flag-list red">${plan.redFlags.map(f=>`<li>${f}</li>`).join('')}</ul>
        </div>`;
      }
      if (plan.greenFlags && plan.greenFlags.length) {
        html += `<div class="modal-flag-section">
          <div class="modal-flag-title green">✓ GREEN FLAGS</div>
          <ul class="modal-flag-list green">${plan.greenFlags.map(f=>`<li>${f}</li>`).join('')}</ul>
        </div>`;
      }
      html += '</div>';
    }
    if (plan.decisionPoint) {
      html += `<div class="modal-decision">
        <div class="modal-decision-label">DECISION POINT</div>
        ${plan.decisionPoint}
      </div>`;
    }
    body.innerHTML = html;
  } catch(e) {
    body.innerHTML = `<div class="modal-loading" style="color:var(--down)">Failed to load plan. Check logs.</div>`;
  } finally {
    btn.textContent = '🤖 GET FOLLOW-UP PLAN';
    btn.disabled = false;
  }
}

async function getNews(ticker, btn, todayOnly=false) {
  const modal = document.getElementById('newsModal');
  const body = document.getElementById('newsBody');
  const title = document.getElementById('newsTitle');
  const subtitle = document.getElementById('newsSubtitle');
  title.textContent = ticker + (todayOnly ? ' — TODAY\'S NEWS' : ' — 7 DAY NEWS');
  subtitle.textContent = todayOnly ? 'Fetching today\'s news...' : 'Fetching last 7 days of news...';
  body.innerHTML = `<div class="modal-loading">📰 Fetching ${todayOnly ? "today's" : "7-day"} news & running AI analysis...<br><span style="font-size:11px;color:var(--muted)">This may take 30-60 seconds</span></div>`;
  modal.classList.add('visible');
  const origText = btn.textContent;
  btn.textContent = '⏳ Loading...';
  btn.disabled = true;
  try {
    const url = `/news/${ticker}${todayOnly ? '?today=1' : ''}`;
    const res = await fetch(url);
    const data = await res.json();
    console.log('News response:', JSON.stringify(data).slice(0, 500));
    if (data.error && !data.items.length) {
      body.innerHTML = `<div class="modal-loading" style="color:var(--muted)">${data.error}</div>`;
      return;
    }
    const impact = data.impact || {};
    const items = data.items || [];
    const pc = data.priceContext || {};
    const score = impact.sentimentScore || 0;
    const sentiment = (impact.overallSentiment || 'neutral').toLowerCase();
    const scoreClass = score > 0 ? 'positive' : score < 0 ? 'negative' : 'neutral-score';
    const confirmation = (impact.marketConfirmation || 'MIXED').toUpperCase();
    const cacheLabel = data.cached ? ' · from cache' : ' · live';
    subtitle.textContent = `${items.length} articles${cacheLabel} · RSI ${pc.rsi14 || '—'} · Vol ${pc.volumeRatio || '—'}x avg`;

    // Price context panel
    const pctColor = v => v == null ? 'var(--muted)' : v >= 0 ? 'var(--up)' : 'var(--down)';
    const pctFmt = v => v == null ? '—' : (v >= 0 ? '+' : '') + v.toFixed(2) + '%';
    const rsi = pc.rsi14;
    const rsiColor = rsi > 70 ? 'var(--down)' : rsi < 30 ? 'var(--up)' : 'var(--accent)';
    const rsiWidth = rsi ? Math.min(100, rsi) : 50;

    let html = `
      <div class="price-context-grid">
        <div class="price-context-card">
          <div class="price-context-label">1D CHANGE</div>
          <div class="price-context-value" style="color:${pctColor(pc.change1d)}">${pctFmt(pc.change1d)}</div>
        </div>
        <div class="price-context-card">
          <div class="price-context-label">7D CHANGE</div>
          <div class="price-context-value" style="color:${pctColor(pc.change7d)}">${pctFmt(pc.change7d)}</div>
        </div>
        <div class="price-context-card">
          <div class="price-context-label">30D CHANGE</div>
          <div class="price-context-value" style="color:${pctColor(pc.change30d)}">${pctFmt(pc.change30d)}</div>
        </div>
        <div class="price-context-card">
          <div class="price-context-label">VOL RATIO</div>
          <div class="price-context-value" style="color:${pc.volumeRatio > 2 ? 'var(--warn)' : 'var(--text)'}">${pc.volumeRatio || '—'}x</div>
        </div>
        <div class="price-context-card">
          <div class="price-context-label">RSI 14</div>
          <div class="price-context-value" style="color:${rsiColor}">${rsi || '—'}</div>
        </div>
        <div class="price-context-card">
          <div class="price-context-label">vs MA20</div>
          <div class="price-context-value" style="color:${pctColor(pc.priceVsMa20)}">${pctFmt(pc.priceVsMa20)}</div>
        </div>
        <div class="price-context-card">
          <div class="price-context-label">vs MA50</div>
          <div class="price-context-value" style="color:${pctColor(pc.priceVsMa50)}">${pctFmt(pc.priceVsMa50)}</div>
        </div>
        <div class="price-context-card">
          <div class="price-context-label">PRICE</div>
          <div class="price-context-value">$${pc.currentPrice || '—'}</div>
        </div>
      </div>
      ${rsi ? `<div class="rsi-bar-wrap">
        <div class="rsi-bar-label"><span>OVERSOLD (30)</span><span>RSI ${rsi}</span><span>OVERBOUGHT (70)</span></div>
        <div class="rsi-bar-track">
          <div class="rsi-bar-fill" style="width:${rsiWidth}%;background:${rsiColor}"></div>
        </div>
      </div>` : ''}
      <div style="margin-bottom:14px">
        <span class="confirmation-badge ${confirmation}">
          ${confirmation === 'CONFIRMS' ? '✓' : confirmation === 'CONTRADICTS' ? '✗' : '~'}
          MARKET ${confirmation} NEWS SENTIMENT
        </span>
      </div>
      <div class="news-sentiment-bar ${sentiment}">
        <div class="news-score ${scoreClass}">${score > 0 ? '+' : ''}${score}</div>
        <div class="news-sentiment-info">
          <div class="news-sentiment-label">${sentiment.toUpperCase()} SENTIMENT</div>
          <div class="news-summary-text">${impact.summary || ''}</div>
        </div>
      </div>`;

    if (impact.priceImpact || impact.tradingImplication) {
      html += `<div class="news-meta-row">
        ${impact.priceImpact ? `<div class="news-meta-card">
          <div class="news-meta-label">PRICE IMPACT</div>
          <div class="news-meta-value">${impact.priceImpact}</div>
        </div>` : ''}
        ${impact.tradingImplication ? `<div class="news-meta-card">
          <div class="news-meta-label">TRADING IMPLICATION</div>
          <div class="news-meta-value">${impact.tradingImplication}</div>
        </div>` : ''}
      </div>`;
    }
    if (impact.watchFor) {
      html += `<div class="news-meta-card" style="margin-bottom:16px">
        <div class="news-meta-label">WATCH FOR</div>
        <div class="news-meta-value">${impact.watchFor}</div>
      </div>`;
    }
    if (impact.keyThemes && impact.keyThemes.length) {
      html += `<div class="news-themes">${impact.keyThemes.map(t=>`<span class="news-theme">${t}</span>`).join('')}</div>`;
    }
    html += `<div class="news-divider">ARTICLES (${items.length})</div>`;
    const aiItems = {};
    (impact.newsItems || []).forEach(n => { aiItems[n.title] = n; });
    items.forEach(item => {
      const ai = aiItems[item.title] || {};
      const impactType = (ai.impact || 'neutral').toLowerCase();
      const sig = (ai.significance || 'low').toLowerCase();
      const date = item.pubDate ? item.pubDate.slice(0,10) : '';
      html += `
      <div class="news-item">
        <div class="news-item-header">
          <div class="news-item-title">
            ${item.url ? `<a href="${item.url}" target="_blank">${item.title}</a>` : item.title}
          </div>
          <span class="news-impact-badge ${impactType}">${impactType.toUpperCase()}</span>
        </div>
        <div class="news-item-meta">
          ${item.provider || ''} · ${date}
          ${sig !== 'low' ? `· <span class="news-sig-${sig}">${sig.toUpperCase()} SIGNIFICANCE</span>` : ''}
        </div>
        ${item.summary ? `<div class="news-item-summary">${item.summary.slice(0,200)}${item.summary.length>200?'...':''}</div>` : ''}
        ${ai.oneLineSummary ? `<div class="news-item-impact">→ ${ai.oneLineSummary}</div>` : ''}
      </div>`;
    });
    body.innerHTML = html;
  } catch(e) {
    console.error('News error:', e);
    body.innerHTML = `<div class="modal-loading" style="color:var(--down)">Failed to load news: ${e.message}</div>`;
  } finally {
    btn.textContent = origText;
    btn.disabled = false;
  }
}

function closeModal() {
  document.getElementById('followupModal').classList.remove('visible');
  document.getElementById('newsModal').classList.remove('visible');
  if (pendingReload) loadData();
}

loadData();
setInterval(pollStatus, 3000);
</script>
